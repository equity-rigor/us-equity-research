name: pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic

      - name: Verify plugin file sync (Sprint 4 Item 8)
        run: |
          bash scripts/sync_plugin_files.sh --check
        # Fails CI if scripts/ or schemas/ inside plugin directories drift
        # from canonical repo-root sources. Forces maintainer to run
        # `bash scripts/sync_plugin_files.sh` before committing.

      - name: Validate JSON schemas
        run: |
          python -c "
          import json, sys
          for p in ['schemas/memo.json', 'schemas/scenarios.json', 'schemas/source_tags.json', 'schemas/verification_gates.json', 'schemas/manifest.json']:
              with open(p) as f: json.load(f)
              print(f'{p}: valid JSON')
          "

      - name: Validate marketplace.json
        run: |
          python -m json.tool .claude-plugin/marketplace.json > /dev/null
          echo "marketplace.json: valid"

      - name: Validate plugin.json files
        run: |
          python -m json.tool us-equity-research/.claude-plugin/plugin.json > /dev/null
          python -m json.tool us-equity-ic-rigor/.claude-plugin/plugin.json > /dev/null
          echo "plugin.json files: valid"

      - name: Run pytest
        run: |
          pytest -q
        # Baseline: 284 tests passing (v0.5.0+). 270 prior + 14 plugin-file-sync regression tests.
